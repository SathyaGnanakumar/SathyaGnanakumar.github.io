<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AReaL asynchronous RL overview and findings</title>
  <desc id="desc">A presentation-style slide summarizing AReaL, asynchronous staleness, and the CISPO validation findings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111f"/>
      <stop offset="100%" stop-color="#10213a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="46" y="42" width="1508" height="816" rx="28" fill="#f7fafc"/>
  <rect x="46" y="42" width="1508" height="128" rx="28" fill="#121a2d"/>
  <rect x="46" y="132" width="1508" height="38" fill="#121a2d"/>
  <text x="96" y="120" fill="#f8fafc" font-size="54" font-family="Arial, Helvetica, sans-serif" font-weight="700">Comparing Algorithms in Asynchronous RL</text>
  <rect x="96" y="136" width="88" height="8" rx="4" fill="#4fb7ff"/>

  <rect x="84" y="206" width="654" height="598" rx="22" fill="url(#panel)" stroke="#cfdbeb"/>
  <text x="124" y="258" fill="#18212f" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">What is AReaL?</text>
  <text x="124" y="302" fill="#516177" font-size="22" font-family="Arial, Helvetica, sans-serif">Async RL system for LLMs with controlled staleness</text>

  <rect x="124" y="336" width="272" height="112" rx="16" fill="#ffe36a" stroke="#9a7f22" stroke-width="3"/>
  <text x="260" y="401" text-anchor="middle" fill="#533f00" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Rollout</text>
  <rect x="466" y="336" width="160" height="112" rx="16" fill="#f49a44" stroke="#8b4f0f" stroke-width="3"/>
  <text x="546" y="401" text-anchor="middle" fill="#482300" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Train</text>
  <line x1="398" y1="392" x2="466" y2="392" stroke="#526278" stroke-width="6"/>
  <polygon points="466,392 444,379 444,405" fill="#526278"/>
  <text x="126" y="488" fill="#33445c" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Synchronous RL</text>
  <text x="126" y="520" fill="#516177" font-size="22" font-family="Arial, Helvetica, sans-serif">Fresh data, stop-and-go compute</text>

  <text x="126" y="566" fill="#33445c" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Asynchronous RL</text>
  <text x="126" y="598" fill="#516177" font-size="22" font-family="Arial, Helvetica, sans-serif">Overlapped compute, stale data risk</text>
  <rect x="124" y="620" width="134" height="100" rx="16" fill="#ffd95a" stroke="#97751d" stroke-width="3"/>
  <rect x="302" y="620" width="134" height="100" rx="16" fill="#ffd95a" stroke="#97751d" stroke-width="3"/>
  <rect x="480" y="620" width="134" height="100" rx="16" fill="#ffd95a" stroke="#97751d" stroke-width="3"/>
  <text x="191" y="678" text-anchor="middle" fill="#533f00" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">v1</text>
  <text x="369" y="678" text-anchor="middle" fill="#533f00" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">v2</text>
  <text x="547" y="678" text-anchor="middle" fill="#533f00" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">v3</text>
  <rect x="204" y="740" width="166" height="48" rx="16" fill="#f49a44" stroke="#8b4f0f" stroke-width="3"/>
  <rect x="396" y="740" width="166" height="48" rx="16" fill="#f49a44" stroke="#8b4f0f" stroke-width="3"/>
  <text x="287" y="771" text-anchor="middle" fill="#482300" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Train v2</text>
  <text x="479" y="771" text-anchor="middle" fill="#482300" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Train v3</text>
  <path d="M191 720 C191 742 287 728 287 740" fill="none" stroke="#ab64ff" stroke-width="4"/>
  <path d="M369 720 C369 742 479 728 479 740" fill="none" stroke="#ab64ff" stroke-width="4"/>
  <text x="462" y="730" fill="#7d4bcc" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">n = 2 means stale rollout data</text>

  <rect x="784" y="206" width="730" height="278" rx="22" fill="url(#panel)" stroke="#cfdbeb"/>
  <text x="824" y="258" fill="#18212f" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Performance Analysis</text>
  <g fill="#516177" font-size="20" font-family="Arial, Helvetica, sans-serif">
    <text x="824" y="318">CISPO: 89.84% at n=4, best under extreme staleness</text>
    <text x="824" y="360">M2PO: 85.94% at n=4, most consistent overall</text>
    <text x="824" y="402">GRPO: 82.81% at n=4, degrades more linearly</text>
    <text x="824" y="444">SAPO: 3.91% at n=4, strong at n=2 but brittle</text>
  </g>
  <g>
    <rect x="1348" y="300" width="120" height="18" rx="9" fill="#f06a34"/>
    <rect x="1348" y="342" width="102" height="18" rx="9" fill="#8a45c5"/>
    <rect x="1348" y="384" width="88" height="18" rx="9" fill="#4a90f3"/>
    <rect x="1348" y="426" width="18" height="18" rx="9" fill="#57b26b"/>
  </g>

  <rect x="784" y="520" width="730" height="284" rx="22" fill="url(#panel)" stroke="#cfdbeb"/>
  <text x="824" y="572" fill="#18212f" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Design Validation</text>
  <g fill="#516177" font-size="20" font-family="Arial, Helvetica, sans-serif">
    <text x="824" y="624">CISPO's conservative importance sampling handles stale gradients best.</text>
    <text x="824" y="664">M2PO stays reliable across sync and async settings.</text>
    <text x="824" y="704">SAPO peaks at moderate staleness, but breaks at high thresholds.</text>
    <text x="824" y="744">AReaL provides a controlled platform for async RL comparison.</text>
  </g>
</svg>
